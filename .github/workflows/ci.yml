name: AgentNexus CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint-test-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev,eval]"
      - name: Lint
        run: ruff check agentnexus/ tests/
      - name: Test
        run: python -m pytest tests/ -v
      - name: Eval
        run: nexus eval run --ci
        env:
          AGENTNEXUS_LLM_API_KEY: ${{ secrets.AGENTNEXUS_LLM_API_KEY }}
          AGENTNEXUS_JUDGE_API_KEY: ${{ secrets.AGENTNEXUS_JUDGE_API_KEY }}
